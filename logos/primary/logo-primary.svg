<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <style>
      .wordmark { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 32px; }
    </style>
  </defs>

  <!-- Symbol (100×72 canvas) -->
  <!-- Top bent bar: horizontal → diagonal down-right -->
  <path d="M 3,14 L 57,14 L 78,38" fill="none" stroke="#1C1C1E" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom bent bar: diagonal down-right → horizontal -->
  <path d="M 22,38 L 43,62 L 97,62" fill="none" stroke="#1C1C1E" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pivot dot -->
  <circle cx="50" cy="38" r="6" fill="#E8366D"/>

  <!-- Wordmark -->
  <text x="112" y="48" class="wordmark">
    <tspan fill="#1C1C1E">Synexor</tspan><tspan fill="#E8366D">AI</tspan>
  </text>
</svg>
