<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="200" height="130">
  <defs>
    <style>
      .wordmark  { font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 700; font-size: 28px; letter-spacing: 0.05em; }
      .tagline   { font-family: 'Space Mono', 'Roboto Mono', monospace; font-weight: 400; font-size: 7.5px; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="130" fill="#0F0F14"/>

  <!-- Symbol — centered -->
  <g transform="translate(50, 0)">
    <path d="M 2,8 L 56,8 L 70,18 L 56,28 L 2,28 Z" fill="#FFFFFF"/>
    <path d="M 98,44 L 44,44 L 30,54 L 44,64 L 98,64 Z" fill="#FFFFFF"/>
    <circle cx="52" cy="36" r="6.5" fill="#E8366D"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="100" text-anchor="middle" class="wordmark">
    <tspan fill="#FFFFFF">SYNEXOR</tspan><tspan fill="#E8366D">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="100" y="117" text-anchor="middle" class="tagline" fill="#7FBCD2">AI-POWERED SUPPLY CHAIN</text>
</svg>
